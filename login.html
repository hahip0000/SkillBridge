<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - SkillBridge</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <style>
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            background: linear-gradient(135deg, #eef4ff, #dbeafe);
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        .login-card {
            width: 100%;
            max-width: 430px;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, .1);
            padding: 35px;
        }

        .logo {
            font-size: 30px;
            font-weight: bold;
            color: #0d6efd;
        }

        .form-control {
            border-radius: 12px;
        }

        .btn {
            border-radius: 12px;
        }

        .role-btn {
            transition: .3s;
        }

        .role-btn:hover {
            transform: translateY(-2px);
        }

        .divider {
            text-align: center;
            margin: 25px 0;
            color: gray;
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: "";
            position: absolute;
            top: 50%;
            width: 35%;
            height: 1px;
            background: #ddd;
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }

        .back-home {
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div class="login-card">

        <div class="text-center mb-4">

            <div class="brand-logo text-center">
                <img src="assets/images/logo.png"
                    alt="SkillBridge" class="img-fluid"
                    style="max-width:100%;height:auto;">
            </div>

            <br>

            <span class="badge bg-primary mt-2">
                DEMO
            </span>

            <h3 class="mt-3 fw-bold">
                Đăng nhập
            </h3>

            <p class="text-muted">
                Kết nối sinh viên và doanh nghiệp
            </p>

        </div>

        <form id="loginForm">

            <div class="mb-3">
                <label class="form-label">
                    Email
                </label>

                <input type="email"
                    class="form-control"
                    placeholder="email@example.com"
                    required>
            </div>

            <div class="mb-3">

                <label class="form-label">
                    Mật khẩu
                </label>

                <input type="password"
                    class="form-control"
                    placeholder="********"
                    required>

            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">

                <div class="form-check">

                    <input class="form-check-input"
                        type="checkbox">

                    <label class="form-check-label">
                        Ghi nhớ
                    </label>

                </div>

                <a href="#" class="text-primary text-decoration-none">
                    Quên mật khẩu?
                </a>

            </div>

            <button class="btn btn-primary w-100 py-2"
                type="submit">

                Đăng nhập

            </button>

        </form>

        <div class="divider">

            hoặc dùng tài khoản demo

        </div>

        <div class="d-grid gap-2">

            <button class="btn btn-outline-primary role-btn"
                onclick="location.href='student-dashboard.html'">

                👨‍🎓 Đăng nhập với vai trò Sinh viên

            </button>

            <button class="btn btn-outline-success role-btn"
                onclick="location.href='company-dashboard.html'">

                🏢 Đăng nhập với vai trò Doanh nghiệp

            </button>

            <button class="btn btn-outline-dark role-btn"
                onclick="location.href='admin-dashboard.html'">

                👨‍💼 Đăng nhập với vai trò Admin

            </button>

        </div>

        <div class="text-center mt-4">

            <a href="index.html"
                class="back-home">

                <i class="bi bi-arrow-left"></i>

                Quay về Trang chủ

            </a>

        </div>

    </div>

    <script>

        document
            .getElementById("loginForm")
            .addEventListener("submit", function (e) {

                e.preventDefault();

                alert("Đăng nhập thành công!");

                window.location.href = "student-dashboard.html";

            });

    </script>

</body>

</html>
